<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed background (macOS applies its own squircle mask) -->
  <rect width="512" height="512" fill="#1a1a1a"/>

  <!-- White speech bubble -->
  <path d="M 92 110
           C 92 82, 116 58, 144 58
           L 368 58
           C 396 58, 420 82, 420 110
           L 420 296
           C 420 324, 396 348, 368 348
           L 210 348
           L 148 410
           L 148 348
           L 144 348
           C 116 348, 92 324, 92 296 Z"
        fill="#ffffff"/>

  <!-- Text lines inside bubble (transcript) -->
  <g fill="#1a1a1a">
    <rect x="140" y="118" width="220" height="16" rx="8"/>
    <rect x="140" y="158" width="185" height="16" rx="8"/>
    <rect x="140" y="198" width="230" height="16" rx="8"/>
    <rect x="140" y="238" width="160" height="16" rx="8"/>
    <rect x="140" y="278" width="200" height="16" rx="8"/>
  </g>

  <!-- Sound wave accent (bottom right) -->
  <g stroke="#ffffff" stroke-width="11" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M 338 388 Q 324 416, 338 444"/>
    <path d="M 366 376 Q 347 416, 366 456"/>
    <path d="M 394 388 Q 380 416, 394 444"/>
  </g>
</svg>
