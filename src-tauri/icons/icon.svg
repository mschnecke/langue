<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Black rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#1a1a1a"/>

  <!-- White speech bubble -->
  <path d="M 108 120
           C 108 96, 128 76, 152 76
           L 360 76
           C 384 76, 404 96, 404 120
           L 404 290
           C 404 314, 384 334, 360 334
           L 210 334
           L 155 392
           L 155 334
           L 152 334
           C 128 334, 108 314, 108 290 Z"
        fill="#ffffff"/>

  <!-- Text lines inside bubble (transcript) -->
  <g fill="#1a1a1a">
    <rect x="152" y="126" width="200" height="14" rx="7"/>
    <rect x="152" y="162" width="170" height="14" rx="7"/>
    <rect x="152" y="198" width="210" height="14" rx="7"/>
    <rect x="152" y="234" width="145" height="14" rx="7"/>
    <rect x="152" y="270" width="185" height="14" rx="7"/>
  </g>

  <!-- Small sound wave accent (bottom right, subtle) -->
  <g stroke="#ffffff" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M 330 380 Q 318 405, 330 430"/>
    <path d="M 355 370 Q 338 405, 355 440"/>
    <path d="M 380 380 Q 368 405, 380 430"/>
  </g>
</svg>
